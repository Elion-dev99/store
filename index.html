<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>モバイルオーダー</title>
    <style>
        body { font-family: sans-serif; background-color: #f8f9fa; margin: 0; padding: 0; }
        .auth-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f8f9fa; z-index: 999; text-align: center; padding-top: 50px; }
        .auth-box { background: white; margin: 20px auto; padding: 20px; border-radius: 16px; width: 85%; max-width: 360px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .container { padding: 16px; }
        .menu-card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

    <div id="pin-set-screen" class="auth-screen">
        <div class="auth-box">
            <h2>🔑 暗証番号を設定</h2>
            <input type="password" id="new-pin" maxlength="4" placeholder="••••" pattern="\d*">
            <button id="set-pin-btn">設定する</button>
        </div>
    </div>
    <div id="pin-enter-screen" class="auth-screen">
        <div class="auth-box">
            <h2>🔓 暗証番号を入力</h2>
            <input type="password" id="input-pin" maxlength="4" placeholder="••••" pattern="\d*">
            <button id="check-pin-btn">ロック解除</button>
        </div>
    </div>

    <div id="main-content">
        <h1>メニュー</h1>
        <div id="menu-list"></div>
        <h3>📋 注文履歴</h3>
        <div id="order-history"></div>
        <p>合計: <span id="total-price">0</span>円</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc, onSnapshot, increment, collection, addDoc, serverTimestamp, query, where } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD11KS2FcAeVF17n62FEJ0GVwiW-z9sf4A",
            authDomain: "store-eec2f.firebaseapp.com",
            projectId: "store-eec2f",
            storageBucket: "store-eec2f.firebasestorage.app",
            messagingSenderId: "571239549348",
            appId: "1:571239549348:web:c6c5c8c2f8661e02ef9931",
            measurementId: "G-7R4R6N4C3M"
        };
        const db = getFirestore(initializeApp(firebaseConfig));
        const tableId = new URLSearchParams(window.location.search).get('table') || '101';
        const tableRef = doc(db, "tables", tableId);

        // 起動時にテーブル状態をチェック
        (async () => {
            const snap = await getDoc(tableRef);
            if (snap.exists() && snap.data().pin) {
                window.savedPin = snap.data().pin;
                document.getElementById('pin-enter-screen').style.display = 'block';
            } else {
                document.getElementById('pin-set-screen').style.display = 'block';
            }
        })();

        document.getElementById('set-pin-btn').onclick = async () => {
            const val = document.getElementById('new-pin').value;
            await updateDoc(tableRef, { pin: val });
            window.savedPin = val;
            hideAuthAndStart();
        };

        document.getElementById('check-pin-btn').onclick = () => {
            if (document.getElementById('input-pin').value === window.savedPin) {
                hideAuthAndStart();
            } else { alert("番号が違います"); }
        };

        function hideAuthAndStart() {
            document.getElementById('pin-set-screen').style.display = 'none';
            document.getElementById('pin-enter-screen').style.display = 'none';
            startMenuSync();
            startOrderHistory();
        }

        // 以下、以前と同じ同期関数...
        function startMenuSync() {
            onSnapshot(collection(db, "products"), (snap) => {
                const list = document.getElementById('menu-list');
                list.innerHTML = "";
                snap.forEach(d => {
                    const data = d.data();
                    list.innerHTML += `<div class="menu-card"><div>${data.name}</div><button onclick="window.orderItem('${d.id}', '${data.name}', ${data.price})">注文</button></div>`;
                });
            });
        }

        function startOrderHistory() {
            onSnapshot(query(collection(db, "orders"), where("tableId", "==", tableId)), (snap) => {
                const hist = document.getElementById('order-history');
                let total = 0;
                hist.innerHTML = "";
                snap.forEach(d => {
                    const data = d.data();
                    total += data.price;
                    hist.innerHTML += `<div>${data.menuName}: ¥${data.price}</div>`;
                });
                document.getElementById('total-price').innerText = total;
            });
        }

        window.orderItem = async (id, name, price) => {
            await updateDoc(doc(db, "products", id), { stock: increment(-1) });
            await addDoc(collection(db, "orders"), { tableId, menuName: name, price, createdAt: serverTimestamp() });
        };
    </script>
</body>
</html>
