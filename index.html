<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>モバイルオーダー</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <style>
        :root { 
            --primary: #111827; --bg: #f9fafb; --surface: #ffffff; 
            --border: #e5e7eb; --text-main: #1f2937; --text-sub: #6b7280; 
            --accent: #2563eb; --radius: 6px; 
        }
        body { font-family: 'Noto Sans JP', sans-serif; background-color: var(--bg); margin: 0; padding: 0; color: var(--text-main); padding-bottom: 80px; -webkit-tap-highlight-color: transparent; }
        
        /* ヘッダー */
        .header { background: var(--surface); padding: 16px; text-align: center; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--border); }
        .header h1 { margin: 0; font-size: 1.1rem; font-weight: 700; letter-spacing: 0.5px; }
        .table-badge { display: inline-block; padding: 4px 12px; font-size: 0.8rem; margin-top: 8px; color: var(--text-sub); border: 1px solid var(--border); border-radius: 4px; }
        
        /* コンテナ・カード */
        .container { padding: 16px; }
        .menu-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
        .menu-card { background: var(--surface); border-radius: var(--radius); padding: 16px; border: 1px solid var(--border); display: flex; gap: 16px; align-items: center; }
        .menu-img { width: 72px; height: 72px; background: var(--bg); border-radius: 4px; object-fit: cover; border: 1px solid var(--border); }
        .menu-info { flex: 1; }
        .menu-info h3 { margin: 0 0 4px 0; font-size: 1rem; font-weight: 500; }
        .menu-info .price { color: var(--text-main); font-weight: 700; font-size: 1rem; }
        
        /* ボタン系 */
        .btn-add { background: transparent; color: var(--primary); border: 1px solid var(--primary); padding: 6px 16px; font-weight: 500; border-radius: 4px; cursor: pointer; transition: background 0.2s, color 0.2s; font-size: 0.9rem; }
        .btn-add:active { background: var(--primary); color: var(--surface); }
        .btn-primary { background: var(--primary); color: var(--surface); border: none; padding: 14px; width: 100%; font-weight: 500; border-radius: var(--radius); font-size: 1rem; cursor: pointer; letter-spacing: 1px; }
        .btn-secondary { background: var(--surface); color: var(--text-main); border: 1px solid var(--border); padding: 14px; width: 100%; font-weight: 500; border-radius: var(--radius); font-size: 1rem; cursor: pointer; }
        
        /* ボトムナビゲーション */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--surface); display: flex; justify-content: space-around; padding: 12px 0 calc(12px + env(safe-area-inset-bottom)); border-top: 1px solid var(--border); z-index: 100; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-sub); text-decoration: none; font-size: 0.7rem; cursor: pointer; position: relative; gap: 4px; }
        .nav-item.active { color: var(--primary); font-weight: 700; }
        .nav-item .material-symbols-outlined { font-size: 1.4rem; font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .nav-item.active .material-symbols-outlined { font-variation-settings: 'FILL' 1; }
        
        .cart-badge { position: absolute; top: -4px; right: -8px; background: var(--accent); color: var(--surface); font-size: 0.65rem; font-weight: bold; width: 16px; height: 16px; border-radius: 50%; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.2s; }
        .cart-badge.show { opacity: 1; }

        /* セクション管理 */
        .section { display: none; }
        .section.active { display: block; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* リスト系 */
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-bottom: 1px solid var(--border); }
        .qty-control { display: flex; align-items: center; gap: 16px; }
        .qty-btn { width: 28px; height: 28px; border-radius: 4px; border: 1px solid var(--border); background: var(--surface); display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-main); }

        /* 認証・ダイアログ */
        .auth-screen { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 999; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .auth-box { background: var(--surface); padding: 32px 24px; border-radius: var(--radius); width: 100%; max-width: 320px; text-align: center; border: 1px solid var(--border); }
        .pin-input { width: 100%; padding: 16px; font-size: 1.5rem; text-align: center; letter-spacing: 16px; border: 1px solid var(--border); border-radius: 4px; margin: 24px 0; box-sizing: border-box; background: var(--bg); outline: none; }
        .pin-input:focus { border-color: var(--primary); }
        
        dialog { border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; width: 85%; max-width: 320px; background: var(--surface); color: var(--text-main); }
        dialog::backdrop { background: rgba(0,0,0,0.4); }
        
        #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-10px); background: var(--primary); color: var(--surface); padding: 12px 24px; border-radius: 4px; font-size: 0.9rem; opacity: 0; transition: 0.3s; z-index: 1000; pointer-events: none; }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>
    <div id="toast"></div>

    <div id="pin-screen" class="auth-screen">
        <div class="auth-box">
            <span class="material-symbols-outlined" style="font-size: 32px; color: var(--text-main); margin-bottom: 12px;">lock</span>
            <h2 id="pin-title" style="margin:0; font-size: 1.1rem; font-weight: 500;"></h2>
            <p id="pin-desc" style="color: var(--text-sub); font-size: 0.85rem; margin-top: 8px;"></p>
            <input type="password" id="input-pin" class="pin-input" maxlength="4" placeholder="••••" pattern="\d*">
            <button id="submit-pin-btn" class="btn-primary">確定</button>
        </div>
    </div>

    <div class="header">
        <h1 id="shop-title">ORDER SYSTEM</h1>
        <div class="table-badge" id="table-info">Table --</div>
    </div>

    <div id="section-menu" class="section active container">
        <div class="menu-grid" id="menu-list">
            <div style="text-align:center; color: var(--text-sub); padding: 40px 0; font-size: 0.9rem;">読み込み中...</div>
        </div>
    </div>

    <div id="section-cart" class="section container">
        <h2 style="margin-top:0; font-size: 1.1rem; border-bottom: 1px solid var(--border); padding-bottom: 12px;">カート</h2>
        <div id="cart-list" style="margin-bottom: 24px;"></div>
        <div style="display:flex; justify-content:space-between; font-size: 1.1rem; font-weight: 700; margin-bottom: 24px; padding-top: 16px;">
            <span>合計</span>
            <span id="cart-total">¥0</span>
        </div>
        <button id="place-order-btn" class="btn-primary" disabled>注文を確定する</button>
    </div>

    <div id="section-history" class="section container">
        <h2 style="margin-top:0; font-size: 1.1rem; border-bottom: 1px solid var(--border); padding-bottom: 12px;">ご注文履歴</h2>
        <div id="order-history" style="margin-bottom: 24px;"></div>
        <div style="display:flex; justify-content:space-between; font-size: 1.1rem; font-weight: 700; margin-bottom: 24px; padding-top: 16px;">
            <span>ご請求額</span>
            <span id="history-total">¥0</span>
        </div>
        <button id="checkout-trigger-btn" class="btn-primary">お会計に進む</button>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="switchSection('menu')">
            <span class="material-symbols-outlined">restaurant_menu</span><span>Menu</span>
        </div>
        <div class="nav-item" onclick="switchSection('cart')">
            <span class="material-symbols-outlined">shopping_cart</span><span>Cart</span>
            <div id="cart-badge" class="cart-badge">0</div>
        </div>
        <div class="nav-item" onclick="switchSection('history')">
            <span class="material-symbols-outlined">receipt_long</span><span>History</span>
        </div>
        <div class="nav-item" onclick="callStaff()">
            <span class="material-symbols-outlined">room_service</span><span>Call</span>
        </div>
    </div>

    <dialog id="checkout-dialog">
        <h3 style="margin-top:0; font-size: 1.1rem; font-weight: 500; text-align: center;">お支払い方法</h3>
        <p style="text-align: center; color: var(--text-sub); font-size: 0.85rem; margin-bottom: 24px;">ご希望の決済方法を選択してください。</p>
        <div style="display: flex; flex-direction: column; gap: 12px;">
            <button id="btn-cashless" class="btn-primary">オンライン決済</button>
            <button id="btn-cash" class="btn-secondary">レジでお支払い</button>
            <button onclick="document.getElementById('checkout-dialog').close()" style="background:none; border:none; color:var(--text-sub); padding: 8px; margin-top:8px; font-size:0.9rem; cursor:pointer;">キャンセル</button>
        </div>
    </dialog>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc, onSnapshot, increment, collection, addDoc, serverTimestamp, query, where, deleteDoc, getDocs, deleteField, writeBatch } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const db = getFirestore(initializeApp({
            apiKey: "AIzaSyD11KS2FcAeVF17n62FEJ0GVwiW-z9sf4A",
            authDomain: "store-eec2f.firebaseapp.com",
            projectId: "store-eec2f",
            storageBucket: "store-eec2f.firebasestorage.app",
            messagingSenderId: "571239549348",
            appId: "1:571239549348:web:c6c5c8c2f8661e02ef9931"
        }));

        const tableId = new URLSearchParams(window.location.search).get('table') || '101';
        const tableRef = doc(db, "tables", tableId);
        let savedPin = "";
        let isSettingPin = false;
        let cart = [];

        document.getElementById('table-info').innerText = `Table ${tableId}`;

        window.switchSection = (sectionId) => {
            document.querySelectorAll('.section').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`section-${sectionId}`).classList.add('active');
            event.currentTarget.classList.add('active');
            if(sectionId === 'cart') renderCart();
        };

        window.showToast = (msg) => {
            const toast = document.getElementById("toast");
            toast.innerText = msg;
            toast.classList.add("show");
            setTimeout(() => toast.classList.remove("show"), 2500);
        };

        async function checkTableStatus() {
            const tableSnap = await getDoc(tableRef);
            const screen = document.getElementById('pin-screen');
            const title = document.getElementById('pin-title');
            const desc = document.getElementById('pin-desc');
            
            screen.style.display = 'flex';
            if (tableSnap.exists() && tableSnap.data().pin) {
                savedPin = tableSnap.data().pin;
                isSettingPin = false;
                title.innerText = 'ロック解除';
                desc.innerText = 'テーブルの暗証番号を入力してください';
            } else {
                isSettingPin = true;
                title.innerText = '暗証番号の登録';
                desc.innerText = 'お客様専用の4桁の番号を設定してください';
            }
        }

        document.getElementById('submit-pin-btn').onclick = async () => {
            const val = document.getElementById('input-pin').value;
            if (val.length !== 4) return showToast("4桁で入力してください");
            
            if (isSettingPin) {
                await updateDoc(tableRef, { pin: val });
                document.getElementById('pin-screen').style.display = 'none';
                initApp();
            } else {
                if (val === savedPin) {
                    document.getElementById('pin-screen').style.display = 'none';
                    initApp();
                } else {
                    showToast("番号が一致しません");
                }
            }
        };

        function initApp() {
            startMenuSync();
            startOrderHistory();
        }

        function startMenuSync() {
            onSnapshot(collection(db, "products"), (snapshot) => {
                const menuList = document.getElementById('menu-list');
                menuList.innerHTML = "";
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const div = document.createElement('div');
                    div.className = 'menu-card';
                    const imgUrl = data.imageURL || 'https://placehold.jp/e9ecef/95a5a6/150x150.png?text=No+Image';
                    div.innerHTML = `
                        <img src="${imgUrl}" class="menu-img">
                        <div class="menu-info">
                            <h3>${data.name}</h3>
                            <div class="price">¥${data.price.toLocaleString()}</div>
                        </div>
                        <button class="btn-add" onclick="window.addToCart('${doc.id}', '${data.name}', ${data.price})">追加</button>
                    `;
                    menuList.appendChild(div);
                });
            });
        }

        window.addToCart = (id, name, price) => {
            const existing = cart.find(item => item.id === id);
            if (existing) existing.qty++;
            else cart.push({ id, name, price, qty: 1 });
            updateCartBadge();
            showToast(`${name} をカートに追加しました`);
        };

        function updateCartBadge() {
            const badge = document.getElementById('cart-badge');
            const totalQty = cart.reduce((sum, item) => sum + item.qty, 0);
            badge.innerText = totalQty;
            totalQty > 0 ? badge.classList.add('show') : badge.classList.remove('show');
        }

        function renderCart() {
            const list = document.getElementById('cart-list');
            const btn = document.getElementById('place-order-btn');
            if (cart.length === 0) {
                list.innerHTML = "<div style='color:var(--text-sub); text-align:center; padding:20px 0;'>カートに商品がありません</div>";
                document.getElementById('cart-total').innerText = "¥0";
                btn.disabled = true;
                return;
            }
            
            btn.disabled = false;
            list.innerHTML = "";
            let total = 0;
            cart.forEach((item, index) => {
                total += item.price * item.qty;
                const div = document.createElement('div');
                div.className = 'list-item';
                div.innerHTML = `
                    <div>
                        <div style="font-size:0.95rem; font-weight:500;">${item.name}</div>
                        <div style="color:var(--text-sub); font-size:0.9rem; margin-top:4px;">¥${item.price.toLocaleString()}</div>
                    </div>
                    <div class="qty-control">
                        <button class="qty-btn" onclick="window.changeQty(${index}, -1)">
                            <span class="material-symbols-outlined" style="font-size:18px;">remove</span>
                        </button>
                        <span style="font-weight:500; width: 16px; text-align:center;">${item.qty}</span>
                        <button class="qty-btn" onclick="window.changeQty(${index}, 1)">
                            <span class="material-symbols-outlined" style="font-size:18px;">add</span>
                        </button>
                    </div>
                `;
                list.appendChild(div);
            });
            document.getElementById('cart-total').innerText = `¥${total.toLocaleString()}`;
        }

        window.changeQty = (index, delta) => {
            cart[index].qty += delta;
            if (cart[index].qty <= 0) cart.splice(index, 1);
            renderCart();
            updateCartBadge();
        };

        document.getElementById('place-order-btn').onclick = async () => {
            if(cart.length === 0) return;
            document.getElementById('place-order-btn').disabled = true;
            document.getElementById('place-order-btn').innerText = "送信中...";

            try {
                const batch = writeBatch(db);
                cart.forEach(item => {
                    for(let i=0; i<item.qty; i++){
                        const newOrderRef = doc(collection(db, "orders"));
                        batch.set(newOrderRef, {
                            tableId: tableId,
                            menuName: item.name,
                            price: item.price,
                            status: "ordered",
                            createdAt: serverTimestamp()
                        });
                    }
                    const productRef = doc(db, "products", item.id);
                    batch.update(productRef, { stock: increment(-item.qty) });
                });
                await batch.commit();

                cart = [];
                updateCartBadge();
                showToast("ご注文を承りました");
                switchSection('history');
                document.getElementById('place-order-btn').innerText = "注文を確定する";
            } catch (error) {
                console.error(error);
                showToast("通信エラーが発生しました");
                document.getElementById('place-order-btn').disabled = false;
                document.getElementById('place-order-btn').innerText = "注文を確定する";
            }
        };

        function startOrderHistory() {
            onSnapshot(query(collection(db, "orders"), where("tableId", "==", tableId)), (snapshot) => {
                const historyList = document.getElementById('order-history');
                historyList.innerHTML = "";
                let total = 0;
                if(snapshot.empty) {
                    historyList.innerHTML = "<div style='color:var(--text-sub); text-align:center; padding:20px 0;'>ご注文履歴はありません</div>";
                    document.getElementById('history-total').innerText = "¥0";
                    return;
                }
                
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    total += Number(data.price);
                    const div = document.createElement('div');
                    div.className = 'list-item';
                    div.style.padding = "12px 0";
                    div.innerHTML = `<span style="font-size:0.95rem;">${data.menuName}</span> <b style="font-weight:500;">¥${data.price.toLocaleString()}</b>`;
                    historyList.appendChild(div);
                });
                document.getElementById('history-total').innerText = `¥${total.toLocaleString()}`;
            });
        }

        window.callStaff = async () => {
            if(!confirm("スタッフを呼び出しますか？")) return;
            try {
                await addDoc(collection(db, "orders"), {
                    tableId: tableId, menuName: "スタッフ呼出", price: 0, status: "ordered", createdAt: serverTimestamp()
                });
                showToast("スタッフを呼び出しました");
            } catch(e) { showToast("通信エラーが発生しました"); }
        };

        const checkoutDialog = document.getElementById('checkout-dialog');
        document.getElementById('checkout-trigger-btn').onclick = () => checkoutDialog.showModal();

        async function processCheckout() {
            try {
                const q = query(collection(db, "orders"), where("tableId", "==", tableId));
                const snapshot = await getDocs(q);
                const batch = writeBatch(db);
                snapshot.docs.forEach(docSnap => batch.delete(doc(db, "orders", docSnap.id)));
                await batch.commit();
                await updateDoc(tableRef, { pin: deleteField() });
                alert("決済処理が完了しました。ご利用ありがとうございました。");
                location.reload();
            } catch (error) { showToast("通信エラーが発生しました"); }
        }

        document.getElementById('btn-cashless').onclick = () => {
            checkoutDialog.close();
            if(confirm("オンライン決済を実行し、テーブルをリセットします。よろしいですか？")) processCheckout();
        };

        document.getElementById('btn-cash').onclick = () => {
            checkoutDialog.close();
            alert("伝票をレジまでお持ちいただき、お会計をお願いいたします。");
        };

        checkTableStatus();
    </script>
</body>
</html>
