name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # または master。あなたのリポジトリのデフォルトブランチ名に合わせてください

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages # 公開用の専用ブランチ
          folder: .        # リポジトリのルート全体を公開
